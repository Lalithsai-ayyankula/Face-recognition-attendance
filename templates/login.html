<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            opacity: 0;
        }
        
        @keyframes twinkle {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 30px;
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(106, 17, 203, 0.6),
                        0 0 50px rgba(37, 117, 252, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards ease-out;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-container:hover {
            box-shadow: 0 0 40px rgba(106, 17, 203, 0.8),
                        0 0 60px rgba(37, 117, 252, 0.6);
            transform: translateY(-5px);
        }
        
        .flash-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            color: #fff;
            background-color: #28a745;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: fadeInOut 3s ease-in-out;
            opacity: 0;
        }
        
        .flash-message.error {
            background-color: #dc3545;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        
        .card {
            background: transparent;
            border: none;
        }
        
        .card-header {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            text-align: center;
            border-radius: 15px 15px 0 0;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 6s infinite linear;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        
        .card-header h3 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        
        .card-header h3::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 3px;
        }
        
        .card-body {
            padding: 30px;
            background-color: rgba(42, 42, 42, 0.4);
            border-radius: 0 0 15px 15px;
        }
        
        .form-label {
            color: #e2e2e2;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        
        .form-control {
            background-color: rgba(42, 42, 42, 0.7);
            border: 1px solid #444;
            color: #fff;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        
        .form-control:focus {
            border-color: #6a11cb;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.3);
            background-color: rgba(42, 42, 42, 0.9);
            color: #fff;
        }
        
        .input-group {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            z-index: 10;
            transition: color 0.2s;
        }
        
        .password-toggle:hover {
            color: #fff;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #2575fc, #6a11cb);
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(106, 17, 203, 0.4);
        }
        
        .btn-primary:hover::before {
            left: 100%;
        }
        
        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 3px 8px rgba(106, 17, 203, 0.4);
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }
        
        .remember-me input {
            margin-right: 8px;
        }
        
        .remember-me label {
            color: #ccc;
            font-size: 14px;
            user-select: none;
            cursor: pointer;
        }
        
        .form-help {
            text-align: center;
            margin-top: 20px;
        }
        
        .form-help a {
            color: #2575fc;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .form-help a:hover {
            color: #6a11cb;
            text-decoration: underline;
        }
        
        .branch-icon {
            margin-right: 8px;
            color: #6a11cb;
        }
        
        .loading {
            display: none;
            position: relative;
            width: 100%;
            height: 3px;
            background-color: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 15px;
            border-radius: 3px;
        }
        
        .loading::after {
            content: '';
            position: absolute;
            left: -100%;
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, transparent, #6a11cb, #2575fc);
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { left: -100%; }
            100% { left: 150%; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <!-- Stars will be generated by JavaScript -->
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message {% if category == 'error' %}error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-terminal"></i> Branch Login</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                    <div class="mb-3">
                        <label for="branch_id" class="form-label"><i class="fas fa-server branch-icon"></i>Branch ID</label>
                        <select id="branch_id" name="branch_id" class="form-control" required>
                            <option value="" selected disabled>Select your branch</option>
                            <option value="CSM">CSM - Computer Science Main</option>
                            <option value="CAI">CAI - Computer Science AI</option>
                            <option value="AID">AID - Artificial Intelligence</option>
                            <option value="CSC">CSC - Computer Science Data</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="user_id" class="form-label"><i class="fas fa-user branch-icon"></i>User ID</label>
                        <input type="text" id="user_id" name="user_id" class="form-control" required placeholder="Enter your user ID">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label"><i class="fas fa-lock branch-icon"></i>Password</label>
                        <div class="input-group">
                            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                            <span class="password-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </button>
                    
                    <div class="loading" id="loadingBar"></div>

                    <div class="form-help">
                        <a href="#" onclick="alert('Please contact your system administrator for password reset.')">Forgot Password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // Create stars background
        function createStars() {
            const starsContainer = document.querySelector('.stars');
            const starsCount = 100;
            
            for (let i = 0; i < starsCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Random position
                const x = Math.floor(Math.random() * window.innerWidth);
                const y = Math.floor(Math.random() * window.innerHeight);
                
                // Random size
                const size = Math.random() * 2;
                
                // Random duration
                const duration = 3 + Math.random() * 7;
                
                // Random delay
                const delay = Math.random() * 5;
                
                star.style.left = `${x}px`;
                star.style.top = `${y}px`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.setProperty('--duration', `${duration}s`);
                star.style.animationDelay = `${delay}s`;
                
                starsContainer.appendChild(star);
            }
        }
        
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        
        // Show loading animation on form submit
        document.getElementById('loginForm').addEventListener('submit', function() {
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loadingBar').style.display = 'block';
        });
        
        // Add shaking animation to form fields that are invalid when form is submitted
        document.getElementById('loginForm').addEventListener('invalid', function(e) {
            e.target.classList.add('invalid');
            e.target.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-5px)' },
                { transform: 'translateX(5px)' },
                { transform: 'translateX(-5px)' },
                { transform: 'translateX(5px)' },
                { transform: 'translateX(0)' }
            ], {
                duration: 400,
                easing: 'ease-in-out'
            });
            setTimeout(() => e.target.classList.remove('invalid'), 400);
        }, true);
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            
            // Add flash message fade out
            const flashMessages = document.querySelectorAll('.flash-message');
            flashMessages.forEach(message => {
                setTimeout(() => {
                    message.style.opacity = '0';
                    setTimeout(() => message.remove(), 1000);
                }, 3000);
            });
        });
    </script>
</body>
</html>
